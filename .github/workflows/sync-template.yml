name: Sync site template

# `site-template/` is the single source of truth for the TimAidley/Timber-site-template
# repo. On every push to main that touches site-template/, mirror its contents into that
# repo (direct push). The template repo is GENERATED — never hand-edit it; edit
# site-template/ here.
#
# Requires a repo secret TEMPLATE_SYNC_TOKEN: a fine-grained PAT scoped to
# TimAidley/Timber-site-template with Contents: Read and write.

on:
  push:
    branches: [main]
    paths:
      - 'site-template/**'
      - '.github/workflows/sync-template.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-template
  cancel-in-progress: false

env:
  TEMPLATE_REPO: TimAidley/Timber-site-template

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Timber
        uses: actions/checkout@v4

      - name: Mirror site-template/ into the template repo
        env:
          TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "TEMPLATE_SYNC_TOKEN is not set. Add a fine-grained PAT with Contents:" >&2
            echo "Read & write on ${TEMPLATE_REPO}, then re-run this workflow." >&2
            exit 1
          fi

          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${TEMPLATE_REPO}.git" out

          # Mirror site-template/ -> out/, deleting anything in out/ that site-template/ no
          # longer has (but never touch out/.git). site-template/ is authoritative.
          rsync -a --delete --exclude='.git' site-template/ out/

          cd out
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "Template already in sync — nothing to push."
          else
            git commit -m "chore: sync from Timber site-template@${GITHUB_SHA:0:12}"
            git push
          fi
